name: Feature request
description: Suggest an improvement for the portfolio template
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What would you like to add or improve?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why it matters
      description: How would this help template users?
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Mockups, examples, or implementation notes.
